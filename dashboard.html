<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartDesc.Ai | Painel</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon-cyan: #00f2ff; --dark-bg: #050608; --glass: rgba(15, 20, 30, 0.85); --border: rgba(0, 242, 255, 0.2); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
        body { background: var(--dark-bg); color: #e6edf3; min-height: 100vh; display: flex; flex-direction: column; }
        #mainLoader { position: fixed; inset: 0; background: var(--dark-bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .spinner { width: 40px; height: 40px; border: 3px solid transparent; border-top-color: var(--neon-cyan); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        header { padding: 20px 5%; background: var(--glass); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .card { background: var(--glass); border: 1px solid var(--border); padding: 25px; border-radius: 12px; margin: 40px 5%; }
        .btn-neon { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--neon-cyan); color: var(--neon-cyan); font-weight: bold; cursor: pointer; margin-top: 15px; }
        #payModal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 999; text-align: center; }
    </style>
</head>
<body>

    <div id="mainLoader"><div class="spinner"></div><p style="margin-top:15px">SISTEMA INICIALIZANDO...</p></div>

    <div id="payModal">
        <div style="background: var(--glass); padding: 40px; border-radius: 15px; border: 1px solid #bc13fe; max-width: 400px;">
            <h2 style="color: #bc13fe">ACESSO BLOQUEADO</h2>
            <p style="margin: 20px 0">Sua conta não possui uma licença ativa.</p>
            <button class="btn-neon" onclick="window.location.reload()" style="border-color: #bc13fe; color: #bc13fe">VERIFICAR NOVAMENTE</button>
        </div>
    </div>

    <div id="app" style="display:none">
        <header>
            <div style="color: var(--neon-cyan); font-weight: 800; font-size: 1.5rem">SMARTDESC.AI</div>
            <button onclick="supabase.auth.signOut().then(()=>window.location.href='index.html')" style="background:none; border:none; color:red; cursor:pointer">SAIR</button>
        </header>
        <div class="card">
            <h3>Gerador de Descrição</h3>
            <textarea id="descInput" style="width:100%; margin:15px 0; padding:10px; background:#000; color:#fff; border:1px solid #333;"></textarea>
            <button class="btn-neon" onclick="alert('IA Gerando...')">GERAR AGORA</button>
        </div>
    </div>

    <script>
        // Usei VAR aqui para NUNCA dar o erro de "já declarado" do seu print
        var SB_URL = 'https://mumsyszwnzkmxobvuomp.supabase.co';
        var SB_KEY = 'sb_publishable_I_U8-E8YjoY1wmntpvjZgw_evNwUMhG';
        var supabase = window.supabase.createClient(SB_URL, SB_KEY);

        async function verificar() {
            try {
                const { data: { user } } = await supabase.auth.getUser();
                if (!user) { window.location.href = 'index.html'; return; }

                const { data: profile } = await supabase
                    .from('perfis')
                    .select('status_pagamento')
                    .eq('id', user.id)
                    .maybeSingle();

                document.getElementById('mainLoader').style.display = 'none';

                if (profile && profile.status_pagamento === true) {
                    document.getElementById('app').style.display = 'block';
                } else {
                    document.getElementById('payModal').style.display = 'flex';
                }
            } catch (e) {
                console.error(e);
                alert("Erro de conexão. Tente novamente.");
            }
        }
        window.onload = verificar;
    </script>
</body>
</html>
